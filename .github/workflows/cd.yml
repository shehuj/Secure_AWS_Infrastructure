name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_db_setup:
        description: 'Skip DB setup (already configured)'
        type: boolean
        default: false
      skip_webserver:
        description: 'Skip webserver Ansible deploy'
        type: boolean
        default: false

concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  TF_VAR_route53_zone_id: ${{ secrets.TF_VAR_ROUTE53_ZONE_ID }}
  TF_VAR_acm_certificate_arn: ${{ secrets.TF_VAR_ACM_CERTIFICATE_ARN }}
  TF_VAR_grafana_certificate_arn: ${{ secrets.TF_VAR_GRAFANA_CERTIFICATE_ARN }}
  TF_VAR_ghost_domain_name: ${{ secrets.TF_VAR_GHOST_DOMAIN_NAME }}
  TF_VAR_grafana_domain_name: ${{ secrets.TF_VAR_GRAFANA_DOMAIN_NAME }}
  # grafana_admin_password_secret_name is set in terraform.tfvars
  TF_VAR_root_volume_size: ${{ secrets.TF_VAR_ROOT_VOLUME_SIZE }}
  TF_VAR_enable_observability: ${{ secrets.TF_VAR_ENABLE_OBSERVABILITY }}
  TF_VAR_prometheus_retention_days: ${{ secrets.TF_VAR_PROMETHEUS_RETENTION_DAYS }}
  PYTHON_VERSION: '3.12'
  ANSIBLE_VERSION: '8.7.0'

jobs:
  # ── 0. Bootstrap: ensure OIDC role & policies are current ────────────────────
  # Uses static bootstrap credentials (AWS_BOOTSTRAP_ACCESS_KEY_ID /
  # AWS_BOOTSTRAP_SECRET_ACCESS_KEY) stored as GitHub secrets.
  # These are the ONLY static credentials in the pipeline — everything else
  # uses OIDC. The bootstrap user needs only IAM + sts:GetCallerIdentity.
  bootstrap-oidc:
    name: Bootstrap OIDC Role
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/bootstrap
    steps:
      - uses: actions/checkout@v4

      - name: Configure bootstrap AWS credentials (static)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_BOOTSTRAP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_BOOTSTRAP_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.7
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -lock-timeout=5m

  # ── 1. Terraform Apply ───────────────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: bootstrap-oidc
    defaults:
      run:
        working-directory: ./terraform
    outputs:
      alb_dns_name: ${{ steps.outputs.outputs.alb_dns_name }}
      ghost_url: ${{ steps.outputs.outputs.ghost_url }}
      grafana_url: ${{ steps.outputs.outputs.grafana_url }}
      ecs_cluster_name: ${{ steps.outputs.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.outputs.outputs.ecs_service_name }}
      rds_identifier: ${{ steps.outputs.outputs.rds_identifier }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.7
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Reconcile Terraform state
        run: |
          # Disable exit-on-error: reconcile is best-effort; individual import
          # failures must not abort the step (each helper handles its own errors).
          set +e

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ENV="prod"

          # Helper: import only if resource exists in AWS and is missing from state
          tf_import() {
            local addr="$1" id="$2"
            if terraform state list "$addr" 2>/dev/null | grep -qF "$addr"; then
              echo "  SKIP (already in state): $addr"
            else
              echo "  Importing $addr => $id"
              terraform import "$addr" "$id" 2>&1 || { echo "  WARN: import failed for $addr (will create fresh)"; return 0; }
            fi
            return 0
          }

          # Helper: import a CloudWatch log group if it exists in AWS
          cw_import() {
            local addr="$1" name="$2"
            local COUNT
            COUNT=$(aws logs describe-log-groups --log-group-name-prefix "$name" \
              --query "length(logGroups[?logGroupName=='$name'])" --output text 2>/dev/null || echo "0")
            if [ "$COUNT" = "1" ]; then tf_import "$addr" "$name"; fi
            return 0
          }

          # Helper: import a security group by name (optionally scoped to VPC)
          sg_import() {
            local addr="$1" sg_name="$2" vpc_id="$3"
            local filter="Name=group-name,Values=$sg_name"
            if [ -n "$vpc_id" ]; then filter="$filter Name=vpc-id,Values=$vpc_id"; fi
            local SG_ID
            SG_ID=$(aws ec2 describe-security-groups --filters $filter \
              --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null || echo "")
            if [ -n "$SG_ID" ] && [ "$SG_ID" != "None" ]; then tf_import "$addr" "$SG_ID"; fi
            return 0
          }

          # Helper: import a target group by name
          tg_import() {
            local addr="$1" tg_name="$2"
            local TG_ARN
            TG_ARN=$(aws elbv2 describe-target-groups --names "$tg_name" \
              --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || echo "")
            if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then tf_import "$addr" "$TG_ARN"; fi
            return 0
          }

          # Helper: import an ALB by name
          alb_import() {
            local addr="$1" alb_name="$2"
            local ALB_ARN
            ALB_ARN=$(aws elbv2 describe-load-balancers --names "$alb_name" \
              --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
            if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then tf_import "$addr" "$ALB_ARN"; fi
            return 0
          }

          # Helper: import an IAM role by name
          role_import() {
            local addr="$1" role_name="$2"
            local ROLE_EXISTS
            ROLE_EXISTS=$(aws iam get-role --role-name "$role_name" \
              --query 'Role.RoleName' --output text 2>/dev/null || echo "")
            if [ -n "$ROLE_EXISTS" ] && [ "$ROLE_EXISTS" != "None" ]; then tf_import "$addr" "$role_name"; fi
            return 0
          }

          # Helper: import a Secrets Manager secret by name
          secret_import() {
            local addr="$1" secret_name="$2"
            local SECRET_ARN
            SECRET_ARN=$(aws secretsmanager describe-secret --secret-id "$secret_name" \
              --query 'ARN' --output text 2>/dev/null || echo "")
            if [ -n "$SECRET_ARN" ] && [ "$SECRET_ARN" != "None" ]; then tf_import "$addr" "$SECRET_ARN"; fi
            return 0
          }

          # Helper: import an ALB listener by ALB name + port
          listener_import() {
            local addr="$1" alb_name="$2" port="$3"
            local ALB_ARN LISTENER_ARN
            ALB_ARN=$(aws elbv2 describe-load-balancers --names "$alb_name" \
              --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || echo "")
            if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
              LISTENER_ARN=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" \
                --query "Listeners[?Port==\`$port\`].ListenerArn" --output text 2>/dev/null || echo "")
              if [ -n "$LISTENER_ARN" ] && [ "$LISTENER_ARN" != "None" ]; then
                tf_import "$addr" "$LISTENER_ARN"
              fi
            fi
            return 0
          }

          # Helper: import EFS mount targets for a given EFS creation token
          # Imports all mount targets ordered by subnet ID (matches Terraform count.index ordering)
          efs_mt_import() {
            local base_addr="$1" creation_token="$2"
            local EFS_ID IDX MT_ID
            EFS_ID=$(aws efs describe-file-systems --creation-token "$creation_token" \
              --query 'FileSystems[0].FileSystemId' --output text 2>/dev/null || echo "")
            if [ -n "$EFS_ID" ] && [ "$EFS_ID" != "None" ]; then
              IDX=0
              for MT_ID in $(aws efs describe-mount-targets --file-system-id "$EFS_ID" \
                --query 'sort_by(MountTargets,&SubnetId)[].MountTargetId' \
                --output text 2>/dev/null); do
                tf_import "${base_addr}[$IDX]" "$MT_ID"
                IDX=$((IDX+1))
              done
            fi
            return 0
          }

          echo "=== VPC (derived from existing ALB) ==="
          ALB_VPC_ID=$(aws elbv2 describe-load-balancers --names "prod-alb" \
            --query 'LoadBalancers[0].VpcId' --output text 2>/dev/null || echo "")
          if [ -z "$ALB_VPC_ID" ] || [ "$ALB_VPC_ID" = "None" ]; then
            ALB_VPC_ID=$(aws elbv2 describe-load-balancers --names "prod-ghost-alb" \
              --query 'LoadBalancers[0].VpcId' --output text 2>/dev/null || echo "")
          fi
          if [ -z "$ALB_VPC_ID" ] || [ "$ALB_VPC_ID" = "None" ]; then
            ALB_VPC_ID=$(aws ec2 describe-vpcs \
              --filters "Name=tag:Name,Values=prod-vpc" \
              --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")
          fi
          VPC_ID="$ALB_VPC_ID"
          echo "  VPC ID: $VPC_ID"
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            tf_import "module.vpc.aws_vpc.main" "$VPC_ID"
          fi

          echo "=== Subnets (same VPC as ALB) ==="
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            # Import public subnets — look up by Type tag first, fallback to mapPublicIpOnLaunch
            IDX=0
            for SN_ID in $(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=map-public-ip-on-launch,Values=true" \
              --query 'sort_by(Subnets,&AvailabilityZone)[].SubnetId' --output text 2>/dev/null); do
              tf_import "module.vpc.aws_subnet.public[$IDX]" "$SN_ID"
              IDX=$((IDX+1))
            done
            IDX=0
            for SN_ID in $(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=$VPC_ID" "Name=map-public-ip-on-launch,Values=false" \
              --query 'sort_by(Subnets,&AvailabilityZone)[].SubnetId' --output text 2>/dev/null); do
              tf_import "module.vpc.aws_subnet.private[$IDX]" "$SN_ID"
              IDX=$((IDX+1))
            done
          fi

          echo "=== IAM Roles ==="
          role_import "module.alb_asg.aws_iam_role.ec2"                              "prod-asg-ec2-role"
          role_import "module.vpc.aws_iam_role.vpc_flow_logs[0]"                     "prod-vpc-flow-logs-role"
          role_import "module.ghost_blog.aws_iam_role.ecs_task_execution"            "prod-ghost-task-execution-role"
          role_import "module.ghost_blog.aws_iam_role.ecs_task"                      "prod-ghost-task-role"
          role_import "module.observability[0].aws_iam_role.ecs_task_execution"      "prod-monitoring-task-execution-role"
          role_import "module.observability[0].aws_iam_role.prometheus_task"         "prod-prometheus-task-role"

          echo "=== IAM Instance Profile ==="
          IP_EXISTS=$(aws iam get-instance-profile --instance-profile-name "prod-asg-instance-profile" \
            --query 'InstanceProfile.InstanceProfileName' --output text 2>/dev/null || echo "")
          if [ -n "$IP_EXISTS" ] && [ "$IP_EXISTS" != "None" ]; then
            tf_import "module.alb_asg.aws_iam_instance_profile.ec2" "prod-asg-instance-profile"
          fi

          echo "=== IAM Policies ==="
          for POLICY_SUFFIX in "prod-asg-ec2-custom-policy"; do
            POLICY_ARN="arn:aws:iam::${ACCOUNT_ID}:policy/${POLICY_SUFFIX}"
            EXISTS=$(aws iam get-policy --policy-arn "$POLICY_ARN" \
              --query 'Policy.Arn' --output text 2>/dev/null || echo "")
            if [ -n "$EXISTS" ]; then tf_import "module.alb_asg.aws_iam_policy.ec2_custom" "$POLICY_ARN"; fi
          done

          echo "=== Security Groups (alb_asg + rds) ==="
          sg_import "module.alb_asg.aws_security_group.alb"          "prod-alb-sg"          "$VPC_ID"
          sg_import "module.alb_asg.aws_security_group.asg_instances" "prod-asg-instances-sg" "$VPC_ID"
          sg_import "module.ghost_db.aws_security_group.rds"         "prod-ghost-rds-sg"    "$VPC_ID"

          echo "=== Security Groups (ecs_ghost) ==="
          sg_import "module.ghost_blog.aws_security_group.ghost_alb"   "prod-ghost-alb-sg"   "$VPC_ID"
          sg_import "module.ghost_blog.aws_security_group.ghost_tasks"  "prod-ghost-tasks-sg" "$VPC_ID"
          sg_import "module.ghost_blog.aws_security_group.ghost_efs"    "prod-ghost-efs-sg"   "$VPC_ID"

          echo "=== Security Groups (observability) ==="
          sg_import "module.observability[0].aws_security_group.grafana_alb"      "prod-grafana-alb-sg"      "$VPC_ID"
          sg_import "module.observability[0].aws_security_group.monitoring_tasks"  "prod-monitoring-tasks-sg" "$VPC_ID"
          sg_import "module.observability[0].aws_security_group.monitoring_efs"    "prod-monitoring-efs-sg"   "$VPC_ID"

          echo "=== Target Groups ==="
          tg_import "module.alb_asg.aws_lb_target_group.web"                 "prod-web-tg"
          tg_import "module.ghost_blog.aws_lb_target_group.ghost"            "prod-ghost-tg"
          tg_import "module.observability[0].aws_lb_target_group.grafana"    "prod-grafana-tg"
          tg_import "module.observability[0].aws_lb_target_group.prometheus" "prod-prometheus-tg"

          echo "=== ALBs ==="
          alb_import "module.alb_asg.aws_lb.main"           "prod-alb"
          alb_import "module.ghost_blog.aws_lb.ghost"        "prod-ghost-alb"
          alb_import "module.observability[0].aws_lb.grafana" "prod-grafana-alb"

          echo "=== Launch Template ==="
          LT_ID=$(aws ec2 describe-launch-templates \
            --filters "Name=launch-template-name,Values=prod-web-*" \
            --query 'LaunchTemplates[0].LaunchTemplateId' --output text 2>/dev/null || echo "")
          if [ -n "$LT_ID" ] && [ "$LT_ID" != "None" ]; then
            tf_import "module.alb_asg.aws_launch_template.web" "$LT_ID"
          fi

          echo "=== Auto Scaling Group ==="
          for ASG_NAME in "prod-web-asg" "prod-webb-asg"; do
            ASG_EXISTS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$ASG_NAME" \
              --query 'length(AutoScalingGroups)' --output text 2>/dev/null || echo "0")
            if [ "$ASG_EXISTS" = "1" ]; then
              tf_import "module.alb_asg.aws_autoscaling_group.web" "$ASG_NAME"
              break
            fi
          done

          echo "=== ECS Cluster ==="
          # aws_ecs_cluster imports by cluster NAME (not ARN) — Terraform builds the ARN internally
          # First remove any bad state entry with a doubled ARN, then re-import by name
          BAD_ID=$(terraform state show "module.ghost_blog.aws_ecs_cluster.ghost" 2>/dev/null \
            | grep '^ *id ' | awk '{print $3}' | tr -d '"')
          if echo "$BAD_ID" | grep -q 'cluster/arn:'; then
            echo "  Removing bad ECS cluster state entry (doubled ARN): $BAD_ID"
            terraform state rm "module.ghost_blog.aws_ecs_cluster.ghost" 2>/dev/null || true
          fi
          CLUSTER_EXISTS=$(aws ecs describe-clusters --clusters "prod-ghost-cluster" \
            --query 'length(clusters[?status==`ACTIVE`])' --output text 2>/dev/null || echo "0")
          if [ "$CLUSTER_EXISTS" = "1" ]; then
            tf_import "module.ghost_blog.aws_ecs_cluster.ghost" "prod-ghost-cluster"
          fi

          echo "=== ECS Services ==="
          for SVC in "prod-ghost-service" "prod-prometheus-service" "prod-grafana-service" \
                     "prod-node-exporter-service" "prod-mysql-exporter-service"; do
            SVC_ARN=$(aws ecs describe-services --cluster "prod-ghost-cluster" --services "$SVC" \
              --query 'services[?status==`ACTIVE`].serviceArn' --output text 2>/dev/null || echo "")
            if [ -n "$SVC_ARN" ] && [ "$SVC_ARN" != "None" ]; then
              case "$SVC" in
                *ghost-service)          tf_import "module.ghost_blog.aws_ecs_service.ghost" \
                                           "prod-ghost-cluster/prod-ghost-service" ;;
                *prometheus-service)     tf_import "module.observability[0].aws_ecs_service.prometheus" \
                                           "prod-ghost-cluster/prod-prometheus-service" ;;
                *grafana-service)        tf_import "module.observability[0].aws_ecs_service.grafana" \
                                           "prod-ghost-cluster/prod-grafana-service" ;;
                *node-exporter-service)  tf_import "module.observability[0].aws_ecs_service.node_exporter" \
                                           "prod-ghost-cluster/prod-node-exporter-service" ;;
                *mysql-exporter-service) tf_import "module.observability[0].aws_ecs_service.mysql_exporter" \
                                           "prod-ghost-cluster/prod-mysql-exporter-service" ;;
              esac
            fi
          done

          echo "=== RDS ==="
          tf_import "module.ghost_db.aws_db_subnet_group.ghost"    "prod-ghost-db-subnet-group"
          tf_import "module.ghost_db.aws_db_parameter_group.ghost" "prod-ghost-mysql-params"
          RDS_EXISTS=$(aws rds describe-db-instances --db-instance-identifier "prod-ghost-db" \
            --query 'DBInstances[0].DBInstanceIdentifier' --output text 2>/dev/null || echo "")
          if [ -n "$RDS_EXISTS" ] && [ "$RDS_EXISTS" != "None" ]; then
            tf_import "module.ghost_db.aws_db_instance.ghost" "prod-ghost-db"
          fi

          echo "=== Secrets Manager ==="
          secret_import "module.ghost_db.aws_secretsmanager_secret.rds_password"      "prod/ghost/rds/master-password"
          secret_import "module.ghost_db.aws_secretsmanager_secret.app_user_password" "prod/ghost/rds/app-password"

          echo "=== SSM Parameters ==="
          declare -A SSM_MAP=(
            ["/prod/ghost/db/host"]="module.ghost_db.aws_ssm_parameter.db_host"
            ["/prod/ghost/db/port"]="module.ghost_db.aws_ssm_parameter.db_port"
            ["/prod/ghost/db/name"]="module.ghost_db.aws_ssm_parameter.db_name"
            ["/prod/ghost/db/master-user"]="module.ghost_db.aws_ssm_parameter.db_master_user"
            ["/prod/ghost/db/app-user"]="module.ghost_db.aws_ssm_parameter.db_app_user"
            ["/prod/prometheus/config"]="module.observability[0].aws_ssm_parameter.prometheus_config"
          )
          for PARAM in "${!SSM_MAP[@]}"; do
            PARAM_EXISTS=$(aws ssm get-parameter --name "$PARAM" \
              --query 'Parameter.Name' --output text 2>/dev/null || echo "")
            if [ -n "$PARAM_EXISTS" ] && [ "$PARAM_EXISTS" != "None" ]; then
              tf_import "${SSM_MAP[$PARAM]}" "$PARAM"
            fi
          done

          echo "=== EFS File Systems ==="
          for EFS_TOKEN in "prod-ghost-efs" "prod-prometheus-efs" "prod-grafana-efs"; do
            EFS_ID=$(aws efs describe-file-systems --creation-token "$EFS_TOKEN" \
              --query 'FileSystems[0].FileSystemId' --output text 2>/dev/null || echo "")
            if [ -n "$EFS_ID" ] && [ "$EFS_ID" != "None" ]; then
              case "$EFS_TOKEN" in
                *ghost*)      tf_import "module.ghost_blog.aws_efs_file_system.ghost" "$EFS_ID" ;;
                *prometheus*) tf_import "module.observability[0].aws_efs_file_system.prometheus" "$EFS_ID" ;;
                *grafana*)    tf_import "module.observability[0].aws_efs_file_system.grafana" "$EFS_ID" ;;
              esac
            fi
          done

          echo "=== EFS Mount Targets ==="
          # Mount targets must be in state so Terraform can destroy them before their SGs
          efs_mt_import "module.ghost_blog.aws_efs_mount_target.ghost"                  "prod-ghost-efs"
          efs_mt_import "module.observability[0].aws_efs_mount_target.prometheus"       "prod-prometheus-efs"
          efs_mt_import "module.observability[0].aws_efs_mount_target.grafana"          "prod-grafana-efs"

          echo "=== ALB Listeners ==="
          # Listeners must be in state so Terraform destroys them before their target groups
          listener_import "module.alb_asg.aws_lb_listener.https"                        "prod-alb"         443
          listener_import "module.alb_asg.aws_lb_listener.http"                         "prod-alb"         80
          listener_import "module.ghost_blog.aws_lb_listener.ghost_https"               "prod-ghost-alb"   443
          listener_import "module.ghost_blog.aws_lb_listener.ghost_http"                "prod-ghost-alb"   80
          listener_import "module.observability[0].aws_lb_listener.grafana_https"       "prod-grafana-alb" 443
          listener_import "module.observability[0].aws_lb_listener.grafana_http"        "prod-grafana-alb" 80
          listener_import "module.observability[0].aws_lb_listener.prometheus"          "prod-grafana-alb" 9090

          echo "=== Route53 Records ==="
          ZONE_ID="${TF_VAR_route53_zone_id}"
          GHOST_DOMAIN="${TF_VAR_ghost_domain_name}"
          if [ -n "$ZONE_ID" ] && [ -n "$GHOST_DOMAIN" ]; then
            for RECORD_NAME in "$GHOST_DOMAIN" "www.${GHOST_DOMAIN}"; do
              R53_EXISTS=$(aws route53 list-resource-record-sets --hosted-zone-id "$ZONE_ID" \
                --query "ResourceRecordSets[?Name=='${RECORD_NAME}.'].Name" \
                --output text 2>/dev/null || echo "")
              if [ -n "$R53_EXISTS" ] && [ "$R53_EXISTS" != "None" ]; then
                case "$RECORD_NAME" in
                  www.*) tf_import "module.ghost_blog.aws_route53_record.ghost_www" \
                           "${ZONE_ID}_${RECORD_NAME}_A" ;;
                  *)     tf_import "module.ghost_blog.aws_route53_record.ghost" \
                           "${ZONE_ID}_${RECORD_NAME}_A" ;;
                esac
              fi
            done
          fi

          echo "=== CloudWatch Log Groups ==="
          cw_import "module.vpc.aws_cloudwatch_log_group.vpc_flow_logs[0]"                     "/aws/vpc/prod-flow-logs"
          cw_import "module.ghost_blog.aws_cloudwatch_log_group.ghost"                         "/ecs/prod/ghost"
          cw_import "module.monitoring.aws_cloudwatch_log_group.nginx_access"                  "/aws/ec2/prod/nginx/access"
          cw_import "module.monitoring.aws_cloudwatch_log_group.nginx_error"                   "/aws/ec2/prod/nginx/error"
          cw_import "module.observability[0].aws_cloudwatch_log_group.prometheus"              "/ecs/prod/prometheus"
          cw_import "module.observability[0].aws_cloudwatch_log_group.grafana"                 "/ecs/prod/grafana"
          cw_import "module.observability[0].aws_cloudwatch_log_group.node_exporter"           "/ecs/prod/node-exporter"
          cw_import "module.observability[0].aws_cloudwatch_log_group.mysql_exporter"          "/ecs/prod/mysql-exporter"
          cw_import "module.user_analytics[0].aws_cloudwatch_log_group.rum"                    "/aws/rum/prod/ghost"
          cw_import "module.user_analytics[0].aws_cloudwatch_log_group.user_analytics"         "/aws/analytics/prod/ghost/users"
          cw_import "module.user_analytics[0].aws_cloudwatch_log_group.pageviews"              "/aws/analytics/prod/ghost/pageviews"
          cw_import "module.user_analytics[0].aws_cloudwatch_log_group.engagement"             "/aws/analytics/prod/ghost/engagement"
          cw_import "module.user_analytics[0].aws_cloudwatch_log_group.api_gateway"            "/aws/apigateway/prod/ghost-analytics"

          echo "=== Reconcile complete ==="

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan -lock-timeout=5m

      - name: Terraform Apply
        run: |
          if ! terraform apply -input=false -lock-timeout=5m tfplan; then
            echo "Saved plan stale — re-planning and applying..."
            terraform plan -input=false -out=tfplan-fresh -lock-timeout=5m
            terraform apply -input=false -lock-timeout=5m tfplan-fresh
          fi

      - name: Capture outputs
        id: outputs
        run: |
          echo "alb_dns_name=$(terraform output -raw alb_dns_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "ghost_url=$(terraform output -raw ghost_alb_dns_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "grafana_url=$(terraform output -raw grafana_url 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "ecs_cluster_name=$(terraform output -raw ghost_ecs_cluster_name 2>/dev/null || echo "${TF_VAR_environment:-prod}-ghost-cluster")" >> $GITHUB_OUTPUT
          echo "ecs_service_name=$(terraform output -raw ghost_ecs_service_name 2>/dev/null || echo "${TF_VAR_environment:-prod}-ghost-service")" >> $GITHUB_OUTPUT
          echo "rds_identifier=$(terraform output -raw rds_identifier 2>/dev/null || echo "${TF_VAR_environment:-prod}-ghost-db")" >> $GITHUB_OUTPUT
        continue-on-error: true

  # ── 2a. Ghost DB Setup (Ansible) ─────────────────────────────────────────────
  db-setup:
    name: Ghost DB Setup
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: ${{ github.event.inputs.skip_db_setup != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        run: pip install ansible==${{ env.ANSIBLE_VERSION }} boto3 botocore

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      # Wait for RDS to finish provisioning before Ansible tries to connect.
      # Terraform marks apply complete once the resource is created, but RDS
      # can take several more minutes to reach the "available" state.
      - name: Wait for RDS instance to be available
        run: |
          RDS_ID="${{ needs.terraform-apply.outputs.rds_identifier }}"
          echo "Waiting for RDS ${RDS_ID} to be available..."
          aws rds wait db-instance-available \
            --db-instance-identifier "${RDS_ID}" \
            --region ${{ env.AWS_REGION }}
          echo "RDS is available."

      # Give EC2 instances time to finish user_data (yum update + installs)
      # and register with SSM. AL2023 user_data takes ~3-5 min; SSM agent
      # is pre-installed and starts in parallel, but registration takes time.
      - name: Wait for EC2 instances to finish booting
        run: |
          echo "Waiting 90s for EC2 instances to complete user_data and register with SSM..."
          sleep 90

      - name: Run ghost_db.yml
        run: |
          cd ansible
          ansible-playbook playbooks/ghost_db.yml \
            -e "app_environment=prod" \
            -v

  # ── 2b. Webserver Deploy (Ansible) ───────────────────────────────────────────
  webserver-deploy:
    name: Webserver Deploy
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: ${{ github.event.inputs.skip_webserver != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible + AWS inventory plugin
        run: pip install ansible==${{ env.ANSIBLE_VERSION }} boto3 botocore

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Wait for ASG instances to be SSM-ready
        run: |
          echo "Waiting 30s for new instances to register with SSM..."
          sleep 30

      - name: Run webserver.yml
        run: |
          cd ansible
          ansible-playbook playbooks/webserver.yml \
            -e "app_environment=prod" \
            -v

  # ── 3. Ghost ECS Restart ─────────────────────────────────────────────────────
  # Runs after both parallel stages. Succeeds as long as Terraform applied
  # cleanly — db-setup and webserver-deploy are allowed to be skipped.
  ghost-restart:
    name: Restart Ghost ECS
    runs-on: ubuntu-latest
    needs: [terraform-apply, db-setup, webserver-deploy]
    if: |
      always() &&
      needs.terraform-apply.result == 'success' &&
      (needs.db-setup.result == 'success' || needs.db-setup.result == 'skipped') &&
      (needs.webserver-deploy.result == 'success' || needs.webserver-deploy.result == 'skipped')
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          CLUSTER="${{ needs.terraform-apply.outputs.ecs_cluster_name }}"
          SERVICE="${{ needs.terraform-apply.outputs.ecs_service_name }}"
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Ghost to stabilise
        run: |
          CLUSTER="${{ needs.terraform-apply.outputs.ecs_cluster_name }}"
          SERVICE="${{ needs.terraform-apply.outputs.ecs_service_name }}"
          REGION="${{ env.AWS_REGION }}"
          MAX_WAIT=900   # 15 minutes — EFS mount + DB migration can exceed 10 min default
          SLEEP=20
          ELAPSED=0

          echo "Waiting up to ${MAX_WAIT}s for ${CLUSTER}/${SERVICE} to stabilise..."
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            INFO=$(aws ecs describe-services \
              --cluster "$CLUSTER" --services "$SERVICE" \
              --region "$REGION" \
              --query 'services[0].{running:runningCount,desired:desiredCount,pending:pendingCount,status:status}' \
              --output json)
            RUNNING=$(echo "$INFO" | jq -r '.running')
            DESIRED=$(echo "$INFO" | jq -r '.desired')
            PENDING=$(echo "$INFO" | jq -r '.pending')
            echo "[${ELAPSED}s/${MAX_WAIT}s] running=${RUNNING}/${DESIRED} pending=${PENDING}"

            if [ "$RUNNING" = "$DESIRED" ] && [ "$PENDING" = "0" ] && [ "$RUNNING" != "0" ]; then
              echo "Service stable."
              exit 0
            fi

            sleep $SLEEP
            ELAPSED=$((ELAPSED + SLEEP))
          done

          echo "ERROR: Service did not stabilise after ${MAX_WAIT}s. Recent events:"
          aws ecs describe-services \
            --cluster "$CLUSTER" --services "$SERVICE" \
            --region "$REGION" \
            --query 'services[0].events[:10]' \
            --output table
          echo "Stopped tasks (last 5):"
          aws ecs list-tasks \
            --cluster "$CLUSTER" --desired-status STOPPED \
            --region "$REGION" \
            --query 'taskArns[:5]' \
            --output text | tr '\t' '\n' | while read ARN; do
              [ -z "$ARN" ] && continue
              aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$ARN" --region "$REGION" \
                --query 'tasks[0].{status:lastStatus,reason:stoppedReason,containers:containers[*].{name:name,reason:reason,exitCode:exitCode}}' \
                --output json
            done
          exit 1

      - name: Health check
        run: |
          GHOST_URL="${{ needs.terraform-apply.outputs.ghost_url }}"
          if [ -n "$GHOST_URL" ]; then
            for i in $(seq 1 5); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${GHOST_URL}/ghost/api/v4/admin/site/" || echo "000")
              echo "Attempt $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
                echo "Ghost healthy!"
                exit 0
              fi
              sleep 15
            done
            echo "WARNING: Ghost health check inconclusive — check manually"
          fi

  # ── 4. Deployment Summary ────────────────────────────────────────────────────
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [terraform-apply, db-setup, webserver-deploy, ghost-restart]
    if: always()
    steps:
      - name: Write summary
        run: |
          TF="${{ needs.terraform-apply.result }}"
          DB="${{ needs.db-setup.result }}"
          WS="${{ needs.webserver-deploy.result }}"
          GH="${{ needs.ghost-restart.result }}"

          icon() { [ "$1" = "success" ] && echo "✅" || [ "$1" = "skipped" ] && echo "⏭️" || echo "❌"; }

          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform Apply | $(icon $TF) $TF |" >> $GITHUB_STEP_SUMMARY
          echo "| Ghost DB Setup | $(icon $DB) $DB |" >> $GITHUB_STEP_SUMMARY
          echo "| Webserver Deploy | $(icon $WS) $WS |" >> $GITHUB_STEP_SUMMARY
          echo "| Ghost ECS Restart | $(icon $GH) $GH |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- **ALB**: \`${{ needs.terraform-apply.outputs.alb_dns_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ghost**: \`${{ needs.terraform-apply.outputs.ghost_url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Grafana**: \`${{ needs.terraform-apply.outputs.grafana_url }}\`" >> $GITHUB_STEP_SUMMARY
