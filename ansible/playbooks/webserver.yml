---
# Web Server Configuration Playbook
#
# Runs on localhost (the CI runner). Uses SSM send-command to push nginx
# configuration and static web content to all running ASG instances.
# No SSH required — all connectivity is through AWS SSM Session Manager.
#
# This is the same architectural pattern as ghost_db.yml: find instances,
# build the payload locally, send via SSM, wait for completion.

- name: Configure Web Servers via SSM
  hosts: localhost
  connection: local
  gather_facts: true  # Needed for ansible_date_time (deploy timestamp in footer)

  vars:
    aws_region: "us-east-1"
    deploy_env: "{{ app_environment | default('prod') }}"
    app_directory: /var/www/html
    nginx_port: 80
    company_name: "SecureCloud"

  tasks:
    - name: Find running ASG web instances
      ansible.builtin.shell: |
        aws ec2 describe-instances \
          --region {{ aws_region }} \
          --filters \
            "Name=tag:Environment,Values={{ deploy_env }}" \
            "Name=tag:Role,Values=web" \
            "Name=instance-state-name,Values=running" \
          --query 'Reservations[].Instances[].InstanceId' \
          --output text
      register: instance_ids_raw
      changed_when: false
      failed_when: instance_ids_raw.stdout == "" or instance_ids_raw.stdout == "None"

    - name: Parse instance IDs
      ansible.builtin.set_fact:
        instance_ids: "{{ instance_ids_raw.stdout.split() }}"

    - name: Show target instances
      ansible.builtin.debug:
        msg: "Deploying to instances: {{ instance_ids }}"

    - name: Verify SSM connectivity to all instances
      ansible.builtin.shell: >
        aws ssm describe-instance-information
        --region {{ aws_region }}
        --filters "Key=InstanceIds,Values={{ item }}"
        --query 'InstanceInformationList[0].PingStatus'
        --output text
      register: ssm_ping
      changed_when: false
      retries: 24
      delay: 10
      until: ssm_ping.stdout == "Online"
      failed_when: ssm_ping.stdout != "Online"
      loop: "{{ instance_ids }}"

    # ── Build file payloads ───────────────────────────────────────────────────
    # Files are gzip-compressed before base64-encoding to stay under the
    # AWS SSM send-command 97 KB parameter limit (raw files total ~77 KB;
    # base64-only encoding pushes the JSON to ~105 KB — over the limit).
    # gzip typically reduces CSS/JS/HTML to ~20-30% of their original size,
    # bringing the encoded payload well under 40 KB.

    - name: Write nginx config to temp file
      ansible.builtin.copy:
        dest: /tmp/deploy_nginx.conf
        mode: "0600"
        content: |
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /run/nginx.pid;

          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" "$http_x_forwarded_for"';

              access_log /var/log/nginx/access.log main;

              sendfile        on;
              tcp_nopush      on;
              tcp_nodelay     on;
              keepalive_timeout 65;
              types_hash_max_size 2048;
              server_tokens   off;

              add_header X-Frame-Options       "SAMEORIGIN" always;
              add_header X-Content-Type-Options "nosniff"   always;
              add_header X-XSS-Protection      "1; mode=block" always;

              server {
                  listen {{ nginx_port }} default_server;
                  listen [::]:{{ nginx_port }} default_server;
                  server_name _;
                  root  {{ app_directory }};
                  index index.html;

                  gzip on;
                  gzip_vary on;
                  gzip_min_length 1024;
                  gzip_types text/plain text/css text/xml text/javascript
                             application/x-javascript application/xml+rss application/json;

                  location = / {
                      try_files /index.html =404;
                  }

                  location = /docs {
                      try_files /docs.html =404;
                  }

                  location /static/ {
                      expires 7d;
                      add_header Cache-Control "public, immutable";
                      access_log off;
                  }

                  location /health {
                      access_log off;
                      return 200 "OK\n";
                      add_header Content-Type text/plain;
                  }

                  location /api/health {
                      access_log off;
                      return 200 '{"status":"healthy","timestamp":"$time_iso8601"}\n';
                      add_header Content-Type application/json;
                  }

                  location / {
                      try_files $uri $uri/ =404;
                  }
              }
          }

    # Templates are rendered here on the CI runner. gather_facts: true provides
    # ansible_date_time (deploy timestamp). EC2-specific facts are overridden
    # so the page shows meaningful values instead of CI runner facts.
    - name: Write rendered HTML templates to temp files
      ansible.builtin.copy:
        content: "{{ lookup('template', item.src) }}"
        dest: "{{ item.dest }}"
        mode: "0600"
      vars:
        ansible_hostname: "{{ deploy_env }}-asg-webserver"
        ansible_default_ipv4:
          address: "10.0.x.x (assigned at boot)"
        ansible_ec2_instance_type: "t3.micro"
        ansible_distribution: "Amazon Linux"
        ansible_distribution_version: "2023"
        ansible_kernel: "6.1 (Amazon Linux 2023)"
      loop:
        - { src: "{{ playbook_dir }}/../templates/index.html.j2", dest: /tmp/deploy_index.html }
        - { src: "{{ playbook_dir }}/../templates/docs.html.j2",  dest: /tmp/deploy_docs.html  }

    - name: Gzip-encode all deploy files
      ansible.builtin.shell: gzip -c {{ item }} | base64 -w 0
      register: gz_results
      loop:
        - /tmp/deploy_nginx.conf
        - "{{ playbook_dir }}/../files/css/styles.css"
        - "{{ playbook_dir }}/../files/js/app.js"
        - /tmp/deploy_index.html
        - /tmp/deploy_docs.html
      changed_when: false

    - name: Set gzip-encoded file facts
      ansible.builtin.set_fact:
        nginx_conf_gz_b64: "{{ gz_results.results[0].stdout }}"
        styles_css_gz_b64: "{{ gz_results.results[1].stdout }}"
        app_js_gz_b64:     "{{ gz_results.results[2].stdout }}"
        index_html_gz_b64: "{{ gz_results.results[3].stdout }}"
        docs_html_gz_b64:  "{{ gz_results.results[4].stdout }}"

    # ── Build and write SSM params JSON ──────────────────────────────────────

    - name: Write SSM deploy params to temp file
      ansible.builtin.copy:
        dest: /tmp/webserver_params.json
        mode: "0600"
        content: "{{ {'commands': deploy_commands} | to_json }}"
      vars:
        deploy_commands:
          - "set -euo pipefail"
          - "mkdir -p {{ app_directory }}/static/css {{ app_directory }}/static/js {{ app_directory }}/static/images"
          - "printf '%s' '{{ nginx_conf_gz_b64 }}'  | base64 -d | gunzip > /etc/nginx/nginx.conf"
          - "printf '%s' '{{ styles_css_gz_b64 }}'  | base64 -d | gunzip > {{ app_directory }}/static/css/styles.css"
          - "printf '%s' '{{ app_js_gz_b64 }}'      | base64 -d | gunzip > {{ app_directory }}/static/js/app.js"
          - "printf '%s' '{{ index_html_gz_b64 }}'  | base64 -d | gunzip > {{ app_directory }}/index.html"
          - "printf '%s' '{{ docs_html_gz_b64 }}'   | base64 -d | gunzip > {{ app_directory }}/docs.html"
          - "echo -n OK > {{ app_directory }}/health"
          - "chown -R nginx:nginx {{ app_directory }}"
          - "nginx -t"
          - "systemctl reload nginx || systemctl restart nginx"
          - "curl -sf http://localhost:{{ nginx_port }}/health | grep -q OK && echo 'Health check passed'"
          - "echo WEBSERVER_DEPLOY_COMPLETE"

    # ── Send command to all instances in parallel ─────────────────────────────

    - name: Dispatch SSM command to each instance
      ansible.builtin.shell: |
        aws ssm send-command \
          --region {{ aws_region }} \
          --instance-ids "{{ item }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Webserver deploy - nginx and static files" \
          --parameters file:///tmp/webserver_params.json \
          --output text \
          --query 'Command.CommandId'
      register: ssm_commands
      changed_when: true
      loop: "{{ instance_ids }}"

    - name: Wait for all SSM commands to complete
      ansible.builtin.shell: >
        aws ssm wait command-executed
        --region {{ aws_region }}
        --command-id "{{ item.stdout | trim }}"
        --instance-id "{{ instance_ids[idx] }}"
      loop: "{{ ssm_commands.results }}"
      loop_control:
        index_var: idx
      changed_when: false

    - name: Verify all deployments succeeded
      ansible.builtin.shell: |
        STATUS=$(aws ssm get-command-invocation \
          --region {{ aws_region }} \
          --command-id "{{ item.stdout | trim }}" \
          --instance-id "{{ instance_ids[idx] }}" \
          --query 'StatusDetails' \
          --output text)
        if [ "$STATUS" != "Success" ]; then
          echo "FAILED on {{ instance_ids[idx] }}: $STATUS"
          aws ssm get-command-invocation \
            --region {{ aws_region }} \
            --command-id "{{ item.stdout | trim }}" \
            --instance-id "{{ instance_ids[idx] }}" \
            --query 'StandardErrorContent' \
            --output text
          exit 1
        fi
        echo "OK: {{ instance_ids[idx] }}"
      loop: "{{ ssm_commands.results }}"
      loop_control:
        index_var: idx
      changed_when: false

    - name: Show deployment output
      ansible.builtin.shell: >
        aws ssm get-command-invocation
        --region {{ aws_region }}
        --command-id "{{ item.stdout | trim }}"
        --instance-id "{{ instance_ids[idx] }}"
        --query 'StandardOutputContent'
        --output text
      loop: "{{ ssm_commands.results }}"
      loop_control:
        index_var: idx
      register: ssm_outputs
      changed_when: false

    - name: Display results per instance
      ansible.builtin.debug:
        msg: "{{ instance_ids[idx] }}: {{ item.stdout_lines }}"
      loop: "{{ ssm_outputs.results }}"
      loop_control:
        index_var: idx

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/webserver_params.json
        - /tmp/deploy_nginx.conf
        - /tmp/deploy_index.html
        - /tmp/deploy_docs.html
