---
# Ghost Database Setup Playbook
#
# Responsibility split:
#   Terraform : provisions RDS instance, security groups, Secrets Manager secrets,
#               SSM parameters for DB endpoint/port/credentials
#   This playbook : creates the application database + restricted app user
#                   by delegating SQL commands to an EC2 instance in the VPC
#                   (GitHub Actions cannot reach the private RDS subnet directly)
#
# Prerequisites:
#   - Terraform apply has completed (RDS is running, SSM params exist)
#   - At least one EC2 ASG instance is running with Environment tag
#   - EC2 IAM role has secretsmanager:GetSecretValue + ssm:GetParameter permissions
#     (added by Terraform to the prod-asg-ec2-custom-policy)
#
# Usage:
#   ansible-playbook playbooks/ghost_db.yml -e "app_environment=prod"

- name: Configure Ghost RDS MySQL Database
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: "us-east-1"
    deploy_env: "{{ app_environment | default('prod') }}"

  tasks:
    - name: Find a running ASG web server instance
      ansible.builtin.shell: |
        aws ec2 describe-instances \
          --region {{ aws_region }} \
          --filters \
            "Name=tag:Environment,Values={{ deploy_env }}" \
            "Name=instance-state-name,Values=running" \
          --query 'Reservations[0].Instances[0].InstanceId' \
          --output text
      register: ec2_instance
      changed_when: false
      failed_when: ec2_instance.stdout == "" or ec2_instance.stdout == "None"

    - name: Verify SSM connectivity to instance
      ansible.builtin.shell: >
        aws ssm describe-instance-information
        --region {{ aws_region }}
        --filters "Key=InstanceIds,Values={{ ec2_instance.stdout }}"
        --query 'InstanceInformationList[0].PingStatus'
        --output text
      register: ssm_ping
      changed_when: false
      retries: 24
      delay: 10
      until: ssm_ping.stdout == "Online"
      failed_when: ssm_ping.stdout != "Online"

    # Write SSM parameters to a JSON file so MySQL single-quote syntax is
    # preserved. Inside a JSON string, single quotes are plain characters —
    # no bash quoting ambiguity. The double quotes inside JSON strings are
    # escaped as \" which JSON decodes back to " before SSM executes the shell
    # commands, giving the shell correctly-quoted command lines.
    - name: Write SSM command parameters to temp file
      ansible.builtin.copy:
        dest: /tmp/ghost_db_params.json
        mode: "0600"
        content: |
          {
            "commands": [
              "set -euo pipefail",
              "which mysql 2>/dev/null || dnf install -y mariadb105 || yum install -y mariadb || apt-get install -y mysql-client || true",
              "which mysql 2>/dev/null || { echo 'ERROR: mysql client not available after install attempts'; exit 1; }",
              "DB_HOST=$(aws ssm get-parameter --region {{ aws_region }} --name /{{ deploy_env }}/ghost/db/host --query Parameter.Value --output text)",
              "DB_NAME=$(aws ssm get-parameter --region {{ aws_region }} --name /{{ deploy_env }}/ghost/db/name --query Parameter.Value --output text)",
              "APP_USER=$(aws ssm get-parameter --region {{ aws_region }} --name /{{ deploy_env }}/ghost/db/app-user --query Parameter.Value --output text)",
              "MASTER_USER=$(aws ssm get-parameter --region {{ aws_region }} --name /{{ deploy_env }}/ghost/db/master-user --query Parameter.Value --output text)",
              "MASTER_PASS=$(aws secretsmanager get-secret-value --region {{ aws_region }} --secret-id {{ deploy_env }}/ghost/rds/master-password --query SecretString --output text)",
              "APP_PASS=$(aws secretsmanager get-secret-value --region {{ aws_region }} --secret-id {{ deploy_env }}/ghost/rds/app-password --query SecretString --output text)",
              "echo 'Creating database...'",
              "mysql -h \"$DB_HOST\" -u \"$MASTER_USER\" -p\"$MASTER_PASS\" -e \"CREATE DATABASE IF NOT EXISTS ${DB_NAME} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;\"",
              "echo 'Creating app user...'",
              "mysql -h \"$DB_HOST\" -u \"$MASTER_USER\" -p\"$MASTER_PASS\" -e \"CREATE USER IF NOT EXISTS '${APP_USER}'@'%' IDENTIFIED BY '${APP_PASS}';\"",
              "mysql -h \"$DB_HOST\" -u \"$MASTER_USER\" -p\"$MASTER_PASS\" -e \"ALTER USER '${APP_USER}'@'%' IDENTIFIED BY '${APP_PASS}';\"",
              "echo 'Granting privileges...'",
              "mysql -h \"$DB_HOST\" -u \"$MASTER_USER\" -p\"$MASTER_PASS\" -e \"GRANT SELECT,INSERT,UPDATE,DELETE,CREATE,DROP,INDEX,ALTER ON ${DB_NAME}.* TO '${APP_USER}'@'%'; FLUSH PRIVILEGES;\"",
              "echo 'Verifying user...'",
              "mysql -h \"$DB_HOST\" -u \"$APP_USER\" -p\"$APP_PASS\" ${DB_NAME} -e \"SELECT 'ghost_app login OK' AS status;\"",
              "echo GHOST_DB_SETUP_COMPLETE"
            ]
          }

    - name: Run database setup via SSM send-command
      ansible.builtin.shell: |
        aws ssm send-command \
          --region {{ aws_region }} \
          --instance-ids "{{ ec2_instance.stdout }}" \
          --document-name "AWS-RunShellScript" \
          --comment "Ghost DB setup - database and app user" \
          --parameters file:///tmp/ghost_db_params.json \
          --output text \
          --query 'Command.CommandId'
      register: ssm_command_id
      changed_when: true

    - name: Wait for SSM command to complete (up to 3 minutes)
      ansible.builtin.shell: >
        aws ssm wait command-executed
        --region {{ aws_region }}
        --command-id "{{ ssm_command_id.stdout | trim }}"
        --instance-id "{{ ec2_instance.stdout }}"
      changed_when: false

    - name: Verify SSM command succeeded
      ansible.builtin.shell: >
        aws ssm get-command-invocation
        --region {{ aws_region }}
        --command-id "{{ ssm_command_id.stdout | trim }}"
        --instance-id "{{ ec2_instance.stdout }}"
        --query 'StatusDetails'
        --output text
      register: ssm_status
      changed_when: false
      failed_when: ssm_status.stdout != "Success"

    - name: Confirm DB setup output
      ansible.builtin.shell: >
        aws ssm get-command-invocation
        --region {{ aws_region }}
        --command-id "{{ ssm_command_id.stdout | trim }}"
        --instance-id "{{ ec2_instance.stdout }}"
        --query 'StandardOutputContent'
        --output text
      register: ssm_output
      changed_when: false

    - name: Show DB setup result
      ansible.builtin.debug:
        msg: "{{ ssm_output.stdout_lines }}"

    - name: Clean up temp file
      ansible.builtin.file:
        path: /tmp/ghost_db_params.json
        state: absent
