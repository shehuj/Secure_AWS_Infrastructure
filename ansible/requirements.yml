---
# Ansible collection requirements
# Install with: ansible-galaxy collection install -r requirements.yml
#
# These collections are also bundled in the `ansible` pip package (>=8.x),
# but declaring them here ensures an explicit, documented version contract.
collections:
  - name: amazon.aws
    version: ">=7.0.0"
  - name: community.aws
    version: ">=7.0.0"
